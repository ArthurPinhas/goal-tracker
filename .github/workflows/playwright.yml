name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Download and Setup PocketBase
      run: |
        # Download a recent version of PocketBase for linux
        mkdir -p /tmp/pb
        wget https://github.com/pocketbase/pocketbase/releases/download/v0.37.4/pocketbase_0.37.4_linux_amd64.zip -O /tmp/pb/pocketbase.zip
        unzip /tmp/pb/pocketbase.zip -d /tmp/pb
        chmod +x /tmp/pb/pocketbase
        # Copy our schema migrations so the DB initializes with the right collections
        cp -r pb_migrations /tmp/pb/
        # Schema is now copied. PocketBase will be started in the test step.

    - name: Run Playwright tests
      run: |
        /tmp/pb/pocketbase serve &
        sleep 3
        npm run test:e2e
      env:
        # Pass any necessary environment variables here
        VITE_POCKETBASE_URL: http://127.0.0.1:8090

    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
