# Optional reference — use your own docker-compose if you already have one.
# This file matches paths/ports used in docs/BEGINNER_SYNOLOGY_DEPLOY.md (Route 1 / home LAN).
# Route 2: see docker-compose.tunnel.yml (localhost-only host ports).

services:
  pocketbase:
    # Tags on GHCR are usually **0.37.4** (no `v`). `v0.37.4` often → "manifest unknown".
    # Pin a version in Container Manager → Image if you prefer.
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: pocketbase
    restart: unless-stopped
    # Must set --dir to the mounted path. The Muchobien image defaults to /pb_data; this compose uses /pb/pb_data.
    command: ["serve", "--http=0.0.0.0:8090", "--dir=/pb/pb_data"]
    volumes:
      - /volume1/docker/pocketbase/pb_data:/pb/pb_data
    ports:
      - "8090:8090"

  goal-tracker-frontend:
    # Full library path avoids some DSM registries mis-resolving short names.
    image: docker.io/library/nginx:alpine
    container_name: goal-tracker-frontend
    restart: unless-stopped
    volumes:
      - /volume1/docker/goal-tracker-frontend:/usr/share/nginx/html:ro
      - /volume1/docker/goal-tracker-nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    # Host port 8888 (left side): avoids 8080 — often already used on DSM / Web Station / other stacks.
    # If 8888 is also taken, change to e.g. 9888 and open http://NASIP:9888 instead.
    ports:
      - "8888:80"
